name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 zip

      - name: Build
        run: |
          mkdir -p dist
          x86_64-w64-mingw32-windres src/app.rc -O coff -o dist/app.res
          x86_64-w64-mingw32-gcc src/main.c src/settings.c src/logger.c dist/app.res \
            -municode -mwindows \
            -lcomdlg32 -ldwmapi -lshell32 -lgdi32 -lwininet -ldbghelp \
            -o dist/cMemo.exe

      - name: Package
        run: |
          mkdir -p release
          cp dist/cMemo.exe release/cMemo.exe
          cp dist/cMemo.exe "cMemo-${GITHUB_REF_NAME}.exe"
          (cd release && zip "../cMemo-${GITHUB_REF_NAME}.zip" cMemo.exe)

      - name: Generate release notes
        shell: bash
        run: |
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
            echo "前回バージョン（${PREVIOUS_TAG}）からの変更点です。" > release-notes.md
          else
            RANGE="${GITHUB_REF_NAME}"
            echo "初回リリースの変更点です。" > release-notes.md
          fi
          echo "" >> release-notes.md
          CHANGES="$(git log --pretty=format:'- %s' "${RANGE}" | grep -vE '^- バージョンを[0-9]+\.[0-9]+\.[0-9]+に更新$' || true)"
          if [ -z "${CHANGES}" ]; then
            echo "- 変更なし" >> release-notes.md
          else
            echo "${CHANGES}" >> release-notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "cMemo-${GITHUB_REF_NAME}.zip" \
            "cMemo-${GITHUB_REF_NAME}.exe" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "cMemo ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
